apiVersion: apps/v1
kind: Deployment
metadata:
  name: turtle-deployment
  namespace: default
spec:
  replicas: 3
  selector:
    matchLabels:
      app: tutle
  template:
    metadata:
      labels:
        app: turtle
    spec:
      containers:
      - name: nginx
        image: nginx:stable
        ports:
        - containerPort: 80
